# =============================================================================
# Docker Compose for local development
# =============================================================================
# Start: docker compose up -d
# Stop:  docker compose down
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: peptidepal
      POSTGRES_PASSWORD: peptidepal_dev
      POSTGRES_DB: peptidepal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
